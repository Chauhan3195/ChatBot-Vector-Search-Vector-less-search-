<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot(Hybrid)</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="upload-section">
        <!-- <input type="file" id="pdfFile" accept="application/pdf" /> -->
        <input type="file" id="pdfFile" accept="application/pdf" multiple />
        <button id="uploadBtn" class="primary-btn" type="button">Upload PDF</button>
          <!--Loader goes here -->
      <div id="uploadLoader" style="display: none; margin-top: 10px;">
        Uploading...
      </div>
        <ul id="fileList" class="list"></ul>
        <div class="upload-info">
          Uploaded files
        </div>
      </div>
      <div class="panel">
        <div class="panel-title panel-title-row">
          <span>Chat History</span>
          <button id="clearAllChatsBtn" class="ghost-btn" type="button" title="Clear all chats">Clear</button>
        </div>
        <button id="newChatBtn" class="icon-add-btn" type="button" title="Add New Chat">
          +
        </button>
        <ul id="historyList" class="list"></ul>

      </div>
    </aside>

    <main class="chat-area">
      <div class="header">
        <div class="title">Chatbot(Vector Search & Vector Less Search)</div>
        <div class="subtitle">Ask questions</div>
      </div>

      <div id="messages" class="messages" aria-live="polite"></div>

      <div class="input-row">
        <input id="question" type="text" placeholder="Type your question..." autocomplete="off" />
        <button id="sendBtn" class="primary-btn" type="button">Send</button>
      </div>
    </main>
  </div>

  <script src="/static/script.js"></script>  
  <div id="globalLoader" class="global-loader" style="display:none;">
    <div class="loader-box">
      Uploading files...
    </div>
  </div> 
</body>
</html>
