<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="panel">
        <div class="panel-title">Upload Documents</div>
        <input type="file" id="fileInput" multiple />
        <button id="uploadBtn" class="primary-btn" type="button">Upload Files</button>
      </div>

      <div class="panel">
        <div class="panel-title">Uploaded Files</div>
        <ul id="fileList" class="list"></ul>
      </div>

      <div class="panel">
        <div class="panel-title">Chat History</div>
        <ul id="historyList" class="list"></ul>
      </div>
    </aside>

    <main class="chat-area">
      <div class="header">
        <div class="title">Chatbot</div>
        <div class="subtitle">Ask questions</div>
      </div>

      <div id="messages" class="messages" aria-live="polite"></div>

      <div class="input-row">
        <input id="question" type="text" placeholder="Type your question..." autocomplete="off" />
        <button id="sendBtn" class="primary-btn" type="button">Send</button>
      </div>
    </main>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
